<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aleksander Klamski - Portfolio</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
        padding: 2rem;
        border: 1px solid #1e293b;
        border-radius: 12px;
        background-color: #1e293b;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #38bdf8;
        margin-bottom: 0.5rem;
      }
      p {
        color: #94a3b8;
        font-size: 1.1rem;
        margin-top: 0;
      }
      a {
        color: #38bdf8;
        text-decoration: none;
        font-weight: bold;
        border: 1px solid #38bdf8;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        transition: all 0.3s;
      }
      a:hover {
        background-color: #38bdf8;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Aleksander Klamski</h1>
      <p>Automatyzacja procesów | Python Developer</p>
      <br />
      <a href="https://github.com/chaotic-neutral-dev1" target="_blank"
        >Zobacz mój GitHub</a
      >
    </div>
  </body>
</html>
